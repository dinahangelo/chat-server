<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Chat CYBERCIA</title>
<link rel="stylesheet" href="/css/all.min.css">
<link rel="stylesheet" href="/css/admin.css">
</head>

<body>
    <audio src="/notification.wav" id="notifSound" preload="auto"></audio>
    
    <div id="clients"></div>
    
    <div class="chat-container">
        <div class="chat-header" id="chatHeader">
            <button id="menuBtn">☰</button>
            <button id="backBtn" style="display:none;"><i class="fa-solid fa-arrow-left"></i></button>
            <span id="chatTittle">Sélectionner un client</span>
        </div>

        <div id="chat"></div>

        <div class="input-box">
            <textarea id="msg" placeholder="Écrire un message..."></textarea>
            <button onclick="send()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="/js/admin.js"></script>

</body>
</html>
